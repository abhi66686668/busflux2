<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BusFlux</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Welcome to BusFlux 🚍</h1>

    <p>Book your bus tickets easily and quickly.</p>

    <a href="login.html">
      <button>Login</button>
    </a>

    <a href="register.html">
      <button>Register</button>
    </a>

    <a href="buses.html">
      <button>View Buses</button>
    </a>

    <button onclick="checkBookingAccess()">
      My Bookings
    </button>

  </div>


  <script>

    function checkBookingAccess(){

      const token = localStorage.getItem("token");

      if(!token){

        alert("Before booking you should register/login");

        window.location.href = "register.html";

      } else {

        window.location.href = "bookings.html";

      }

    }

  </script>

</body>
</html>

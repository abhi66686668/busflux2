
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    Login - BusFlux
  </title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet"
        href="style.css">


  <!-- PWA Manifest and Mobile Web App Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1c24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>

<body class="fade-in">

  <!-- HEADER -->

  <header class="main-header">

    <div class="nav-container">

      <a href="index.html"
         class="logo">

        <i class="fas fa-bus-alt"></i>

        BusFlux

      </a>

      <ul class="nav-links">

        <li>
          <a href="index.html">
            Home
          </a>
        </li>

        <li>
          <a href="buses.html">
            Buses
          </a>
        </li>

        <li>
          <a href="login.html"
             class="active">
            Login
          </a>
        </li>

      </ul>

    </div>

  </header>



  <!-- LOGIN CONTAINER -->

  <div class="container">

    <h1>

      <span>BusFlux</span>

      Login

    </h1>

    <p class="subtitle">

      Access your digital ticket portal

    </p>



    <!-- LOGIN FORM -->

    <form id="loginForm">



      <!-- EMAIL -->

      <div class="form-group">

        <label class="form-label">

          Email Address

        </label>

        <div class="input-wrapper">

          <input
            type="email"
            id="loginEmail"
            placeholder="Enter your email"
            required
          >

          <i class="fas fa-envelope"></i>

        </div>

      </div>



      <!-- PASSWORD -->

      <div class="form-group">

        <label class="form-label">

          Password

        </label>

        <div class="input-wrapper">

          <input
            type="password"
            id="loginPassword"
            placeholder="Enter your password"
            required
          >

          <i class="fas fa-lock"></i>

        </div>

      </div>



      <!-- FORGOT PASSWORD -->

      <div
        style="
          text-align:right;
          margin-bottom:15px;
        "
      >

        <a href="forgot.html"
           style="
             color:#8b5cf6;
             text-decoration:none;
             font-size:14px;
           ">

          Forgot Password?

        </a>

      </div>



      <!-- LOGIN BUTTON -->

      <button type="submit">

        <i class="fas fa-right-to-bracket"></i>

        Login

      </button>

    </form>



    <!-- MESSAGE -->

    <p id="loginMessage"
       style="
         text-align:center;
         margin-top:15px;
         color:var(--text-muted);
         font-size:0.95rem;
       ">
    </p>



    <!-- REGISTER LINK -->

    <div class="form-footer-link">

      Don't have an account?

      <a href="register.html">

        Register here

      </a>

    </div>

  </div>



  <!-- TOAST -->

  <div id="toastContainer"></div>

  <script src="script.js?v=2"></script>

</body>

</html>

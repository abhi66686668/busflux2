<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - BusFlux</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .profile-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .profile-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .profile-photo-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 15px;
      cursor: pointer;
    }
    .profile-photo-wrapper:hover::after {
      content: 'Edit';
      position: absolute;
      top: 0; left: 0; width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .profile-photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: var(--muted);
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(15, 23, 42, 0.6);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    .form-group input:focus {
      border-color: var(--primary);
      outline: none;
    }
    .form-group input[readonly] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .save-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .save-btn:hover {
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
      transform: translateY(-2px);
    }
  </style>

  <!-- PWA Manifest and Mobile Web App Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1c24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>

  <header class="main-header">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-bus-alt"></i> BusFlux
      </a>
      <ul class="nav-links" id="navLinks">
        <!-- Generated dynamically by script.js -->
      </ul>
    </div>
  </header>

  <div class="profile-container">
    <div class="profile-header">
      <div class="profile-photo-wrapper" onclick="document.getElementById('userPhoto').click()">
        <img id="profileImage" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile" class="profile-photo">
      </div>
      <input type="file" id="userPhoto" accept="image/*" style="display: none;" onchange="previewImage(event)">
      <h2 id="profileNameDisplay">Loading...</h2>
      <p style="color: var(--muted); margin-top: 5px;">Manage your account details</p>
    </div>

    <form id="profileForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" required>
      </div>

      <!-- Read Only Fields -->
      <div class="form-group">
        <label>Age <span style="font-size: 0.7rem; color: #f43f5e;">(Cannot be changed)</span></label>
        <input type="text" id="age" readonly>
      </div>

      <div class="form-group">
        <label>Email Address <span style="font-size: 0.7rem; color: #f43f5e;">(Cannot be changed)</span></label>
        <input type="email" id="email" readonly>
      </div>

      <div class="form-group">
        <label>Aadhaar / College ID <span style="font-size: 0.7rem; color: #f43f5e;">(Cannot be changed)</span></label>
        <input type="text" id="idNumber" readonly>
      </div>

      <div id="messageBox" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center;"></div>

      <button type="submit" class="save-btn" id="saveBtn"><i class="fas fa-save"></i> Save Changes</button>
    </form>

    <!-- ══════════ PERMANENT BOARDING PASS QR CODE ══════════ -->
    <div style="margin-top: 35px; padding-top: 25px; border-top: 1px dashed rgba(255,255,255,0.1); text-align: center;">
      <h3 style="font-size: 1.25rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;">
        <i class="fas fa-id-card"></i> My Permanent Boarding Pass
      </h3>
      <p style="color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; line-height: 1.4;">
        Present this QR code to the conductor when boarding. The ride fare will be automatically deducted from your wallet balance.
      </p>
      
      <div style="background: #fff; padding: 15px; border-radius: 16px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid rgba(99,102,241,0.2);">
        <img id="profileQrImage" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile QR Code" style="width: 160px; height: 160px; display: block;">
      </div>
      
      <div style="margin-top: 15px;">
        <button type="button" class="btn-secondary" onclick="downloadProfileQR()" style="width: auto; display: inline-flex; padding: 8px 16px; font-size: 0.9rem; margin-top: 0;">
          <i class="fas fa-download"></i> Download QR Pass
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // 1. Navbar setup handled by script.js
      updateNavbar();

      const token = localStorage.getItem("token");
      if (!token) return window.location.href = "login.html";

      try {
        const res = await fetch("/api/auth/me", {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const user = await res.json();
        
        if (res.ok) {
          document.getElementById('name').value = user.name || "";
          document.getElementById('profileNameDisplay').textContent = user.name || "User";
          document.getElementById('phone').value = user.phone || "";
          document.getElementById('age').value = user.age || "";
          document.getElementById('email').value = user.email || "";
          document.getElementById('idNumber').value = user.aadhaarNumber || user.collegeId || "Not Provided";
          
          if (user.userPhoto) {
            document.getElementById('profileImage').src = "/" + user.userPhoto;
          }
          
          if (user.profileQr) {
            document.getElementById('profileQrImage').src = user.profileQr;
          }
        }
      } catch (err) {
        console.error("Failed to fetch profile");
      }
    });

    window.downloadProfileQR = function() {
      const qrImg = document.getElementById('profileQrImage');
      if (!qrImg || !qrImg.src || qrImg.src.startsWith('https://cdn-icons-png')) {
        alert("QR Code not loaded yet.");
        return;
      }
      const a = document.createElement("a");
      a.href = qrImg.src;
      a.download = `BusFlux-Profile-Pass-${document.getElementById('email').value}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    };

    function previewImage(event) {
      if (event.target.files && event.target.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('profileImage').src = e.target.result;
        }
        reader.readAsDataURL(event.target.files[0]);
      }
    }

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const token = localStorage.getItem("token");
      const saveBtn = document.getElementById("saveBtn");
      const msgBox = document.getElementById("messageBox");

      saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
      saveBtn.disabled = true;

      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('phone', document.getElementById('phone').value);

      const fileInput = document.getElementById('userPhoto');
      if (fileInput.files.length > 0) {
        formData.append('userPhoto', fileInput.files[0]);
      }

      try {
        const res = await fetch("/api/auth/me", {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`
          },
          body: formData
        });
        
        const data = await res.json();
        
        msgBox.style.display = "block";
        if (res.ok) {
          msgBox.style.background = "rgba(16, 185, 129, 0.1)";
          msgBox.style.color = "var(--success)";
          msgBox.style.border = "1px solid var(--success)";
          msgBox.textContent = "Profile updated successfully!";
          document.getElementById('profileNameDisplay').textContent = document.getElementById('name').value;
        } else {
          msgBox.style.background = "rgba(244, 63, 94, 0.1)";
          msgBox.style.color = "var(--danger)";
          msgBox.style.border = "1px solid var(--danger)";
          msgBox.textContent = data.message || "Failed to update profile";
        }
      } catch (err) {
        msgBox.style.display = "block";
        msgBox.style.background = "rgba(244, 63, 94, 0.1)";
        msgBox.style.color = "var(--danger)";
        msgBox.style.border = "1px solid var(--danger)";
        msgBox.textContent = "Network error. Please try again.";
      } finally {
        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
        saveBtn.disabled = false;
        
        // Hide message after 3 seconds
        setTimeout(() => {
          msgBox.style.display = "none";
        }, 3000);
      }
    });
  </script>
</body>
</html>
